<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="disc" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#f2be42"/>
      <stop offset="100%" stop-color="#b07d18"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0a0a0b"/>

  <!-- Reel disc -->
  <circle cx="16" cy="16" r="13.5" fill="url(#disc)"/>

  <!-- Subtle rim shadow -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#0a0a0b" stroke-width="1" opacity="0.35"/>

  <!-- Inner hub cutout -->
  <circle cx="16" cy="16" r="5" fill="#0a0a0b"/>

  <!--
    3 reel holes at 30°, 150°, 270° — distance 9 from center
    30°:  x=16+9·cos30°=23.79,  y=16+9·sin30°=20.50
    150°: x=16+9·cos150°=8.21,  y=16+9·sin150°=20.50
    270°: x=16+9·cos270°=16.00, y=16+9·sin270°=7.00
  -->
  <circle cx="23.79" cy="20.5" r="2.8" fill="#0a0a0b"/>
  <circle cx="8.21"  cy="20.5" r="2.8" fill="#0a0a0b"/>
  <circle cx="16"    cy="7"    r="2.8" fill="#0a0a0b"/>

  <!-- Center spindle — mirrors the .logo-dot from the header -->
  <circle cx="16" cy="16" r="2.2" fill="#e8a930"/>
  <circle cx="16" cy="16" r="1"   fill="#0a0a0b"/>
</svg>
